spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/govcareer_auth}
    username: ${DB_USER:govcareer_admin}
    password: ${DB_PASSWORD:secure_password_123}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS:false}
jwt:
  secret: ${JWT_SECRET:NDEyM0FBNUJCMkM0RkU1RDY4Nzc5QTIzNEI5QzZFMzVBRjk4QzE2MjkzRTU2RDI0NTVCNzA5RDRC}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: auth-service
